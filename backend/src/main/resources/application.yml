server:
  port: 8080

spring:
  application:
    name: marketai-backend
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/marketai?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: MarketAI-HikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
  sql:
    init:
      mode: always
      schema-locations: classpath:db/init.sql
      continue-on-error: true
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  task:
    scheduling:
      pool:
        size: 5
      thread-name-prefix: scheduler-

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# JWT 配置
jwt:
  secret: ${JWT_SECRET:marketai-dev-secret-key-change-in-production}
  expiration: 604800000  # 7 days (ms)

# SpringDoc
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# 数据采集配置
marketai:
  datasource:
    collect-interval-hours: 6  # 定时采集间隔, 对应 cron "0 0 */6 * * *"

# 日志
logging:
  level:
    com.marketai.backend: DEBUG
    org.springframework.security: INFO
server:
  port: 8080

spring:
  application:
    name: marketai-backend
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/marketai?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: MarketAI-HikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
  sql:
    init:
      mode: always
      schema-locations: classpath:db/init.sql
      continue-on-error: true
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  task:
    scheduling:
      pool:
        size: 5
      thread-name-prefix: scheduler-

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# JWT 配置
jwt:
  secret: ${JWT_SECRET:marketai-dev-secret-key-change-in-production}
  expiration: 604800000  # 7 days (ms)

# SpringDoc
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# MarketAI 业务配置
marketai:
  datasource:
    collect-interval-hours: 6  # 定时采集间隔, 对应 cron "0 0 */6 * * *"
  ai:
    provider: deepseek          # 当前激活的 LLM: deepseek / qwen / glm
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:sk-48dc2ab656434ed9be572d8962f76a56}
      base-url: https://api.deepseek.com/v1
      model: deepseek-chat      # deepseek-chat(通用) / deepseek-reasoner(深度推理)
    qwen:
      api-key: ${QWEN_API_KEY:}
      model: qwen-plus
      # qwen-plus / qwen-max载入
    glm:
      api-key: ${GLM_API_KEY:}
      model: glm-4-plus         # glm-4-plus / glm-4-flash
    rate-limit:
      requests-per-minute: 10   # 每用户每分钟最多调用次数
  admin:
    emails: demo@marketai.com,zqcysj@163.com   # 逗号分隔, 允许访问 POST /llm/chat 的管理员邮箱

# CORS 配置 (逗号分隔, * 表示允许全部)
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

# 日志
logging:
  file:
    path: ${LOG_PATH:logs}
  level:
    com.marketai.backend: DEBUG
    org.springframework.security: INFO